name: Release

# Push a tag like v1.0.0 to build the app and publish a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the release

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Build (Release)
        run: |
          xcodebuild \
            -project NotchGlass.xcodeproj \
            -scheme NotchGlass \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package
        run: |
          APP="build/Build/Products/Release/NotchGlass.app"
          test -d "$APP" || { echo "::error::App not found at $APP"; exit 1; }
          # Ad-hoc sign so the app has a stable signature (still not notarized).
          codesign --force --deep --sign - "$APP" || true
          # Zip preserving the bundle (ditto, not zip, for correct macOS metadata).
          ditto -c -k --keepParent "$APP" "NotchGlass-${GITHUB_REF_NAME}.zip"
          ls -la NotchGlass-*.zip

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: NotchGlass-*.zip
          generate_release_notes: true
          body: |
            ### Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | bash
            ```

            Or download the `.zip` below, unzip, and drag **NotchGlass.app** into Applications.

            > The app is not notarized. The installer clears the quarantine flag for you;
            > if you install manually, run `xattr -dr com.apple.quarantine /Applications/NotchGlass.app`.
